<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Admin | SSH INTEL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: radial-gradient(circle at center, #1a1c2c 0%, var(--bg-color) 100%);
        }
        .login-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(0, 210, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .login-logo {
            font-family: var(--font-tech);
            font-size: 2rem;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            font-family: var(--font-main);
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }
        .error-msg {
            background: rgba(218, 54, 51, 0.1);
            color: var(--danger);
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            border: 1px solid rgba(218, 54, 51, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card reveal">
            <div class="login-logo">SSH INTEL</div>
            <h2 style="margin-bottom: 2rem; font-size: 1.2rem;">PAINEL ADMIN</h2>
            
            {% if error %}
            <div class="error-msg">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="Seu usuário" required>
                </div>
                <div class="form-group" style="margin-bottom: 2.5rem;">
                    <label>Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-primary">
                    ENTRAR NO PAINEL
                </button>
            </form>
        </div>
    </div>
</body>
</html>
