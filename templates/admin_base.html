<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}SSH INTEL Admin{% endblock %}</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'brand-bg': '#0a0b10',
                        'brand-card': '#161b22',
                        'neon-blue': '#00d2ff',
                        'neon-purple': '#9d50bb',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'sans-serif'],
                        'tech': ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background-color: #0a0b10; color: #e6edf3; }
        .sidebar-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-item-active { background: rgba(0, 210, 255, 0.1); color: #00d2ff; border-right: 3px solid #00d2ff; }
        .glass-effect { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="font-sans antialiased overflow-x-hidden">

    <!-- Mobile Header -->
    <header class="lg:hidden flex items-center justify-between p-4 glass-effect sticky top-0 z-50 border-b border-white/5">
        <div class="font-tech text-xl font-bold bg-gradient-to-r from-neon-blue to-neon-purple bg-clip-text text-transparent">SSH INTEL</div>
        <button id="mobileMenuBtn" class="text-white text-2xl focus:outline-none">
            <i class="fas fa-bars"></i>
        </button>
    </header>

    <div class="flex min-h-screen">
        <!-- Sidebar Overlay (Mobile) -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden opacity-0 transition-opacity duration-300"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-brand-card border-r border-white/5 z-50 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
            <div class="p-8 hidden lg:block">
                <div class="font-tech text-2xl font-bold bg-gradient-to-r from-neon-blue to-neon-purple bg-clip-text text-transparent tracking-wider">SSH INTEL</div>
                <p class="text-[10px] text-gray-500 uppercase tracking-[3px] mt-1">Management Panel</p>
            </div>

            <nav class="flex-1 px-4 mt-4 lg:mt-0 space-y-2">
                <a href="/dashboard" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 group hover:bg-white/5 {% if request.path == '/dashboard' %}nav-item-active{% else %}text-gray-400{% endif %}">
                    <i class="fas fa-chart-pie w-5 text-center group-hover:text-neon-blue"></i>
                    <span class="font-medium">Dashboard</span>
                </a>
                <a href="/card" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 group hover:bg-white/5 {% if request.path == '/card' %}nav-item-active{% else %}text-gray-400{% endif %}">
                    <i class="fas fa-server w-5 text-center group-hover:text-neon-blue"></i>
                    <span class="font-medium">Servidores</span>
                </a>
                <a href="/admin/xray" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 group hover:bg-white/5 {% if request.path == '/admin/xray' %}nav-item-active{% else %}text-gray-400{% endif %}">
                    <i class="fas fa-link w-5 text-center group-hover:text-neon-blue"></i>
                    <span class="font-medium">Links XRAY</span>
                </a>
                <a href="/config" class="flex items-center gap-4 px-4 py-3 rounded-xl transition-all duration-200 group hover:bg-white/5 {% if request.path == '/config' %}nav-item-active{% else %}text-gray-400{% endif %}">
                    <i class="fas fa-sliders w-5 text-center group-hover:text-neon-blue"></i>
                    <span class="font-medium">Configurações</span>
                </a>
            </nav>

            <div class="p-4 border-t border-white/5">
                <a href="/logout" class="flex items-center gap-4 px-4 py-3 rounded-xl text-red-400 hover:bg-red-400/10 transition-colors duration-200 group">
                    <i class="fas fa-sign-out-alt w-5 text-center"></i>
                    <span class="font-medium">Sair da Conta</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 lg:ml-64 w-full min-w-0">
            <div class="max-w-7xl mx-auto p-6 lg:p-10">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const mobileBtn = document.getElementById('mobileMenuBtn');

        function toggleSidebar() {
            const isOpen = !sidebar.classList.contains('-translate-x-full');
            if (isOpen) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                overlay.classList.replace('opacity-100', 'opacity-0');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.replace('opacity-0', 'opacity-100'), 10);
                document.body.style.overflow = 'hidden';
            }
        }

        mobileBtn?.addEventListener('click', toggleSidebar);
        overlay?.addEventListener('click', toggleSidebar);

        // Handle Escape key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
